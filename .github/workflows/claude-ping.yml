name: Claude Ping

on: 
  schedule:
    - cron: '0 5 * * 1-5'  # 7:00 CEST (UTC+2), Mon-Fri

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude
        run: |
          claude -p "Respond exactly with: ok" --model haiku --safe-mode --bare

      - name: Keep repo active
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "$(TZ=Europe/Rome date)" > .last-ping
          git add .last-ping
          git commit -m "ping $(TZ=Europe/Rome date '+%Y-%m-%d %H:%M:%S %Z')" || true
          git push
